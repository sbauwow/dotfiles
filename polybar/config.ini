;==========================================================
;   Neon Cyber Polybar Config
;==========================================================

;----------------------------------------------------------
;   Palette — sourced from ~/.Xresources (polybar.* block).
;   Each value falls back to its Neon Cyber hex if xrdb is
;   unavailable, so polybar renders cleanly on a fresh X
;   session before xrdb has been merged.
;----------------------------------------------------------

[neon]
bg        = ${xrdb:polybar.bg:#0a0e14}
bg-dark   = ${xrdb:polybar.bg-dark:#060a0f}
bg-hl     = ${xrdb:polybar.bg-hl:#151b24}
fg        = ${xrdb:polybar.fg:#d4dce6}
fg-dark   = ${xrdb:polybar.fg-dark:#8b949e}
fg-gutter = ${xrdb:polybar.fg-gutter:#1c2433}
comment   = ${xrdb:polybar.comment:#4a5568}
cyan      = ${xrdb:polybar.cyan:#00e5ff}
blue      = ${xrdb:polybar.blue:#0088ff}
electric  = ${xrdb:polybar.electric:#00b4d8}
pink      = ${xrdb:polybar.pink:#ff0080}
lime      = ${xrdb:polybar.lime:#00ff88}
yellow    = ${xrdb:polybar.yellow:#ffea00}
orange    = ${xrdb:polybar.orange:#ff6d00}
red       = ${xrdb:polybar.red:#ff3d3d}
purple    = ${xrdb:polybar.purple:#bd00ff}

;----------------------------------------------------------
;   Bar
;----------------------------------------------------------

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 34
radius = 0
fixed-center = true

background = ${neon.bg}
foreground = ${neon.fg}

line-size = 0

border-bottom-size = 1
border-bottom-color = ${neon.bg-hl}

padding-left = 2
padding-right = 2

module-margin-left = 1
module-margin-right = 1

; Noto Sans for text, Nerd Font for icons
font-0 = "JetBrainsMono Nerd Font:size=10;3"
font-1 = "JetBrainsMono Nerd Font:size=15;4"
font-2 = "JetBrainsMono Nerd Font:size=8;2"

modules-left = i3 sep media
modules-center = title
modules-right = weather cpu-temp cpu memory ip wlan eth pulseaudio battery date tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3

; Non-primary monitors run this — tray omitted so only `main` claims
; _NET_SYSTEM_TRAY_S0. See dotfiles/polybar/launch.sh.
[bar/secondary]
inherit = bar/main
modules-right = weather cpu-temp cpu memory ip wlan eth pulseaudio battery date

;----------------------------------------------------------
;   Decorations
;----------------------------------------------------------

[module/sep]
type = custom/text
content = " | "
content-foreground = ${neon.fg-gutter}

;----------------------------------------------------------
;   Left Modules
;----------------------------------------------------------

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
pin-workspaces = true

label-mode-padding = 2
label-mode-foreground = ${neon.bg}
label-mode-background = ${neon.cyan}

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = ${neon.cyan}
label-focused-foreground = ${neon.bg}
label-focused-padding = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-foreground = ${neon.comment}
label-unfocused-padding = 2

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-background = ${neon.bg-hl}
label-visible-foreground = ${neon.fg-dark}
label-visible-padding = 2

; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-background = ${neon.red}
label-urgent-foreground = ${neon.bg}
label-urgent-padding = 2

[module/media]
type = custom/script
exec = ~/.config/polybar/scripts/media.sh
interval = 3
label = %output%
label-foreground = ${neon.pink}
format-font = 3

;----------------------------------------------------------
;   Center Modules
;----------------------------------------------------------

[module/title]
type = internal/xwindow
label = %title:0:15:...%
label-foreground = ${neon.fg-dark}
label-minlen = 15
label-alignment = left

;----------------------------------------------------------
;   Right Modules
;----------------------------------------------------------

[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/updates.sh
interval = 600
label = %output%
label-foreground = ${neon.orange}

[module/weather]
type = custom/script
exec = ~/.config/polybar/scripts/weather.sh
interval = 600
label = %output%
label-foreground = ${neon.cyan}
format-font = 3

[module/cpu-temp]
type = internal/temperature
interval = 5
thermal-zone = 5
warn-temperature = 80

format = <label>
format-prefix = " "
format-prefix-foreground = ${neon.red}
label = %temperature-c%
label-foreground = ${neon.fg}

format-warn = <label-warn>
format-warn-prefix = " "
format-warn-prefix-foreground = ${neon.red}
label-warn = %temperature-c%
label-warn-foreground = ${neon.red}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${neon.lime}
label = "%percentage:2%%"
label-foreground = ${neon.fg}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${neon.yellow}
label = "%percentage_used:2%%"
label-foreground = ${neon.fg}

[module/disk]
type = internal/fs
mount-0 = /
interval = 30
fixed-values = true

format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${neon.purple}
label-mounted = "%percentage_used%%"
label-mounted-foreground = ${neon.fg}

format-unmounted =

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${neon.fg}

ramp-volume-0 =
ramp-volume-1 =
ramp-volume-2 =
ramp-volume-foreground = ${neon.blue}

label-muted = 󰝟 muted
label-muted-foreground = ${neon.comment}

[module/ip]
type = custom/script
exec = ~/.config/polybar/scripts/ip.sh
interval = 10
format-prefix = "󰩟 "
format-prefix-foreground = ${neon.purple}
label = %output%
label-foreground = ${neon.fg}

[module/wlan]
type = internal/network
interface-type = wireless
interval = 2

format-connected = <label-connected>
format-connected-prefix = "󰖩 "
format-connected-prefix-foreground = ${neon.electric}
label-connected = %downspeed%  %upspeed%
label-connected-foreground = ${neon.fg}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰖪 "
format-disconnected-prefix-foreground = ${neon.comment}
label-disconnected = off
label-disconnected-foreground = ${neon.comment}

[module/eth]
type = internal/network
interface-type = wired
interval = 3.0

format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${neon.electric}
label-connected = %local_ip%
label-connected-foreground = ${neon.fg}

format-disconnected =

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery.sh
interval = 5
label = %output%

[module/date]
type = internal/date
interval = 1

date = %b %d
time = %H:%M

format-prefix = " "
format-prefix-foreground = ${neon.blue}
label = %date% %time%
label-foreground = ${neon.fg}

[module/tray]
type = internal/tray
tray-spacing = 8
tray-size = 65%
tray-foreground = ${neon.fg}

;----------------------------------------------------------
;   Settings
;----------------------------------------------------------

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
