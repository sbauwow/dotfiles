;==========================================================
;   Windows 11 Polybar — bottom bar, dark translucent, acrylic
;==========================================================

[win11]
bg        = #E6202020
bg-solid  = #202020
bg-dark   = #0F0F0F
bg-hl     = #2C2C2C
fg        = #FFFFFF
fg-dark   = #C5C5C5
fg-gutter = #3A3A3A
comment   = #8E8E8E
accent    = #0078D4
cyan      = #60CDFF
blue      = #0078D4
electric  = #60CDFF
pink      = #C239B3
lime      = #6CCB5F
yellow    = #FCE100
orange    = #F7630C
red       = #E81123
purple    = #744DA9

[bar/main]
monitor = ${env:MONITOR:}
bottom = true
width = 100%
height = 40
radius = 0
fixed-center = true

background = ${win11.bg-solid}
foreground = ${win11.fg}

line-size = 2
line-color = ${win11.accent}

padding-left = 2
padding-right = 2

module-margin-left = 1
module-margin-right = 1

font-0 = "Segoe UI:size=10;3"
font-1 = "JetBrainsMono Nerd Font:size=10;3"
font-2 = "JetBrainsMono Nerd Font:size=15;4"
font-3 = "JetBrainsMono Nerd Font:size=8;2"

modules-left = i3 sep media
modules-center = title
modules-right = weather cpu-temp cpu memory ip wlan eth pulseaudio battery date tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3

[bar/secondary]
inherit = bar/main
modules-right = weather cpu-temp cpu memory ip wlan eth pulseaudio battery date

[module/sep]
type = custom/text
content = " | "
content-foreground = ${win11.fg-gutter}

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
pin-workspaces = true

label-mode-padding = 2
label-mode-foreground = ${win11.bg-solid}
label-mode-background = ${win11.accent}

label-focused = %index%
label-focused-background = ${win11.bg-hl}
label-focused-foreground = ${win11.accent}
label-focused-underline = ${win11.accent}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${win11.comment}
label-unfocused-padding = 2

label-visible = %index%
label-visible-background = ${win11.bg-hl}
label-visible-foreground = ${win11.fg-dark}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${win11.red}
label-urgent-foreground = ${win11.fg}
label-urgent-padding = 2

[module/media]
type = custom/script
exec = ~/.config/polybar/scripts/media.sh
interval = 3
label = %output%
label-foreground = ${win11.purple}
format-font = 2

[module/title]
type = internal/xwindow
label = %title:0:15:...%
label-foreground = ${win11.fg-dark}
label-minlen = 15
label-alignment = left

[module/weather]
type = custom/script
exec = ~/.config/polybar/scripts/weather.sh
interval = 600
label = %output%
label-foreground = ${win11.cyan}
format-font = 2

[module/cpu-temp]
type = internal/temperature
interval = 5
thermal-zone = 5
warn-temperature = 80

format = <label>
format-prefix = " "
format-prefix-foreground = ${win11.red}
label = %temperature-c%
label-foreground = ${win11.fg}

format-warn = <label-warn>
format-warn-prefix = " "
format-warn-prefix-foreground = ${win11.red}
label-warn = %temperature-c%
label-warn-foreground = ${win11.red}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${win11.lime}
label = "%percentage:2%%"
label-foreground = ${win11.fg}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${win11.yellow}
label = "%percentage_used:2%%"
label-foreground = ${win11.fg}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${win11.fg}

ramp-volume-0 =
ramp-volume-1 =
ramp-volume-2 =
ramp-volume-foreground = ${win11.accent}

label-muted = 󰝟 muted
label-muted-foreground = ${win11.comment}

[module/ip]
type = custom/script
exec = ~/.config/polybar/scripts/ip.sh
interval = 10
format-prefix = "󰩟 "
format-prefix-foreground = ${win11.purple}
label = %output%
label-foreground = ${win11.fg}

[module/wlan]
type = internal/network
interface-type = wireless
interval = 2

format-connected = <label-connected>
format-connected-prefix = "󰖩 "
format-connected-prefix-foreground = ${win11.accent}
label-connected = %downspeed%  %upspeed%
label-connected-foreground = ${win11.fg}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰖪 "
format-disconnected-prefix-foreground = ${win11.comment}
label-disconnected = off
label-disconnected-foreground = ${win11.comment}

[module/eth]
type = internal/network
interface-type = wired
interval = 3.0

format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${win11.accent}
label-connected = %local_ip%
label-connected-foreground = ${win11.fg}

format-disconnected =

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery.sh
interval = 5
label = %output%

[module/date]
type = internal/date
interval = 1

date = %b %d
time = %H:%M

format-prefix = " "
format-prefix-foreground = ${win11.accent}
label = %date% %time%
label-foreground = ${win11.fg}

[module/tray]
type = internal/tray
tray-spacing = 8
tray-size = 65%
tray-foreground = ${win11.fg}

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
