[general]
import = ["~/.config/alacritty/theme.toml"]

[font]
size = 12

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[window]
padding = { x = 8, y = 8 }
decorations = "None"

[scrolling]
history = 10000

[bell]
duration = 0

[terminal.shell]
program = "/home/stathis/dotfiles/local-bin/alacritty-tmux"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
