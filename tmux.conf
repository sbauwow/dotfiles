# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"

# Mouse support
set -g mouse on

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Prefix: Ctrl+a (easier than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize with Shift+arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Don't rename windows automatically
set -g allow-rename off

# Push session name into the X11 window title so kindle-buddy preview can map
# the focused window back to a tmux session.
set -g set-titles on
set -g set-titles-string '#S'

# Colors come from wpg. Template at ~/dotfiles/wpg/templates/colors-tmux.conf
# .base; rendered to ~/.config/wpg/templates/colors-tmux.conf on every
# `wpg -s <wallpaper>`. if-shell guards a fresh checkout with no render yet.
if-shell "[ -f ~/.config/wpg/templates/colors-tmux.conf ]" \
  "source-file ~/.config/wpg/templates/colors-tmux.conf"
