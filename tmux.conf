# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"

# Mouse support
set -g mouse on

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Prefix: Ctrl+a (easier than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize with Shift+arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Don't rename windows automatically
set -g allow-rename off

# Tokyo Night status bar
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-right "#[fg=#9ece6a]%H:%M #[fg=#bb9af7]%d-%b"
set -g status-left-length 30
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W "
set -g window-status-format "#[fg=#414868] #I:#W "
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
