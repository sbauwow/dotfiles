--[[
==========================================================
  Neon Cyber Conky — i3 shortcuts overlay (bottom_left)
==========================================================
]]

conky.config = {
    alignment = 'bottom_left',
    background = true,
    double_buffer = true,
    update_interval = 5.0,
    no_buffers = true,
    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=9',
    xftalpha = 1,

    own_window = true,
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,

    gap_x = 25,
    gap_y = 55,
    minimum_width = 260,

    default_color = 'd4dce6',
    color1        = '00e5ff', -- cyan header
    color2        = '00b4d8', -- electric label
    color3        = 'ff0080', -- pink key
    color6        = '4a5568', -- comment
    color7        = '1c2433', -- gutter
}

conky.text = [[
${color1}${font JetBrainsMono Nerd Font:bold:size=10} i3 shortcuts${font}
${color7}${hr 1}${color}
${color2}terminal${alignr}${color3}mod+Enter
${color2}kill window${alignr}${color3}mod+Shift+q
${color2}browser${alignr}${color3}mod+F2
${color2}split toggle${alignr}${color3}mod+q
${color2}rofi menu${alignr}${color3}mod+d
${color2}workspace N${alignr}${color3}mod+1-8
${color2}move to ws N${alignr}${color3}mod+Shift+1-8
${color2}nav workspaces${alignr}${color3}mod+Ctrl+←→
${color2}toggle float${alignr}${color3}mod+Shift+Space
${color2}reload i3${alignr}${color3}mod+Shift+c
${color2}restart i3${alignr}${color3}mod+Shift+r
${color2}exit${alignr}${color3}mod+Shift+e
${color7}${hr 1}${color}
${color6}mod = Super${alignr}help: mod+Shift+h
]]
