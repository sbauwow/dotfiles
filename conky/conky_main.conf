--[[
==========================================================
  Neon Cyber Conky — main system monitor (top_right)
  Palette matches polybar/Xresources neon cyber theme.
==========================================================
]]

conky.config = {
    alignment = 'top_right',
    background = true,
    double_buffer = true,
    update_interval = 1.0,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    no_buffers = true,
    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=9',
    xftalpha = 1,

    own_window = true,
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    gap_x = 25,
    gap_y = 55,
    minimum_width = 240,
    maximum_width = 260,
    alignment = 'top_right',

    -- Neon Cyber palette
    default_color  = 'd4dce6', -- fg
    color1         = '00e5ff', -- cyan (headers)
    color2         = '00b4d8', -- electric (labels)
    color3         = '00ff88', -- lime (good values)
    color4         = 'ff0080', -- pink (accent)
    color5         = 'ffea00', -- yellow (warn)
    color6         = '4a5568', -- comment
    color7         = '1c2433', -- fg-gutter
}

conky.text = [[
${voffset 4}${color1}${font JetBrainsMono Nerd Font:bold:size=16}${time %A}${font}\
${alignr}${color}${font JetBrainsMono Nerd Font:bold:size=32}${time %e}${font}
${voffset -22}${color}${font JetBrainsMono Nerd Font:size=14}${time %b %Y}${font}${alignr}${color2}${time %H:%M}
${color7}${hr 1}${color}
#
${voffset 6}${color1} CPU${color} ${alignr}${color3}${cpu cpu0}%${color}
${color6}${cpubar cpu0 4,240 00b4d8 00e5ff}${color}
${voffset 2}${color2}${top name 1}${alignr}${color}${top cpu 1}%
${color2}${top name 2}${alignr}${color}${top cpu 2}%
${color2}${top name 3}${alignr}${color}${top cpu 3}%
#
${voffset 8}${color1} RAM${color} ${alignr}${color3}$mem${color} / $memmax
${color6}${membar 4,240}${color}
${voffset 2}${color2}${top_mem name 1}${alignr}${color}${top_mem mem_res 1}
${color2}${top_mem name 2}${alignr}${color}${top_mem mem_res 2}
${color2}${top_mem name 3}${alignr}${color}${top_mem mem_res 3}
#
${voffset 8}${color1}󰋊 DISK${color} ${alignr}${color3}${fs_used /}${color} / ${fs_size /}
${color6}${fs_bar 4,240 /}${color}
#
${if_existing /proc/net/route wlan0}\
${voffset 8}${color1} NET${color} ${alignr}${color2}${wireless_essid wlan0}
${color2}󰇚 ${color}${downspeed wlan0}${alignr}${color2}󰕒 ${color}${upspeed wlan0}
${else}${if_existing /proc/net/route eth0}\
${voffset 8}${color1}󰈀 NET${color} ${alignr}${color2}${addr eth0}
${color2}󰇚 ${color}${downspeed eth0}${alignr}${color2}󰕒 ${color}${upspeed eth0}
${endif}${endif}\
#
${voffset 10}${color7}${hr 1}${color}
${voffset 4}${color6}${alignr}${execi 10000 whoami}@${nodename}
${color6}${alignr}up ${color}${uptime_short}${color6}  kernel ${color}${kernel}
]]
